<section class="screen screen-center" id="screen-reveal">
  <div class="reveal-verdict" id="reveal-verdict"></div>
  <div class="card reveal-card">
    <p class="reveal-line">The imposter was</p>
    <h2 class="reveal-name" id="reveal-imposter">—</h2>
    <p class="reveal-line">The group voted for</p>
    <h3 class="reveal-voted" id="reveal-voted">—</h3>
    <hr class="reveal-hr" />
    <div class="qrow">
      <span class="qtag qtag-real">Real question</span>
      <p id="reveal-q-real">—</p>
    </div>
    <div class="qrow">
      <span class="qtag qtag-imp">Imposter got</span>
      <p id="reveal-q-imp">—</p>
    </div>
  </div>
  <div class="scoreboard" id="reveal-scoreboard"></div>
  <button class="btn btn-primary btn-big" id="btn-next-round" type="button">Next Round</button>
</section>

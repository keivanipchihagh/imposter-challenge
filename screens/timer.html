<section class="screen screen-center" id="screen-timer">
  <header class="hero hero-sm">
    <h1 class="logo logo-sm">Round <span id="timer-round">1</span></h1>
    <p class="tagline">Discuss. Defend. Deceive.</p>
  </header>
  <div class="timer-ring" id="timer-ring">
    <span class="timer-num" id="timer-display">90</span>
  </div>
  <div class="timer-controls">
    <button class="btn btn-ghost" id="btn-timer-toggle" type="button">Pause</button>
    <button class="btn btn-ghost" id="btn-timer-reset" type="button">Reset</button>
  </div>
  <button class="btn btn-primary btn-big" id="btn-to-vote" type="button">Time's up — Vote</button>
</section>
